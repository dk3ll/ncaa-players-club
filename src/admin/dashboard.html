<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0a0e1a;color:#e8eaf0;min-height:100vh}
header{background:linear-gradient(135deg,#1a237e,#0d47a1);padding:16px 24px;border-bottom:3px solid #f9a825;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:1.2rem;font-weight:800}header h1 span{color:#f9a825}
.btn{background:#f9a825;color:#0a0e1a;border:none;padding:8px 16px;border-radius:6px;font-weight:700;cursor:pointer;font-size:0.85rem}
.btn:hover{background:#fbc02d}
.btn-sm{background:#1e2d4a;color:#90caf9;padding:6px 12px;font-size:0.78rem}
.container{max-width:1200px;margin:0 auto;padding:24px}
.section{background:#131929;border:1px solid #1e2d4a;border-radius:10px;padding:20px;margin-bottom:20px}
.section h2{font-size:1rem;font-weight:700;margin-bottom:12px;color:#f9a825}
table{width:100%;border-collapse:collapse;font-size:0.82rem}
th{text-align:left;padding:8px 10px;color:#78909c;font-size:0.7rem;text-transform:uppercase;border-bottom:1px solid #1e2d4a}
td{padding:8px 10px;border-bottom:1px solid #0a0e1a}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:#0f1624;border:1px solid #1e2d4a;border-radius:8px;padding:16px;text-align:center}
.stat-card .num{font-size:2rem;font-weight:900;color:#f9a825}
.stat-card .label{font-size:0.75rem;color:#78909c;text-transform:uppercase;letter-spacing:0.8px}
</style></head><body>
<header><h1>🔒 <span>Admin Dashboard</span></h1><button class="btn" onclick="location.href='/admin/logout'">Logout</button></header>
<div class="container">
<div class="stat-grid"><div class="stat-card"><div class="num" id="s-regs">0</div><div class="label">Registrations</div></div>
<div class="stat-card"><div class="num" id="s-rooms">0</div><div class="label">Draft Rooms</div></div>
<div class="stat-card"><div class="num" id="s-feedback">0</div><div class="label">Feedback</div></div></div>
<div class="section"><h2>Registrations</h2><table><thead><tr><th>Name</th><th>Email</th><th>Key</th><th>Donation</th><th>Date</th></tr></thead><tbody id="reg-body"></tbody></table></div>
<div class="section"><h2>Draft Rooms</h2><table><thead><tr><th>Code</th><th>League</th><th>Status</th><th>Teams</th><th>Created</th></tr></thead><tbody id="room-body"></tbody></table></div>
<div class="section"><h2>Feedback</h2><table><thead><tr><th>Page</th><th>Rating</th><th>Message</th><th>Date</th></tr></thead><tbody id="fb-body"></tbody></table></div>
</div>
<script>
async function load(){
  const r=await fetch('/admin/api/data');
  if(!r.ok){location.href='/admin';return}
  const d=await r.json();
  document.getElementById('s-regs').textContent=d.registrations.length;
  document.getElementById('s-rooms').textContent=d.rooms.length;
  document.getElementById('s-feedback').textContent=d.feedback.length;
  document.getElementById('reg-body').innerHTML=d.registrations.map(r=>`<tr><td>${r.firstName} ${r.lastName}</td><td>${r.email}</td><td style="font-family:monospace;color:#f9a825">${r.accessKey}</td><td>${r.donation||'—'}</td><td>${new Date(r.createdAt).toLocaleDateString()}</td></tr>`).join('');
  document.getElementById('room-body').innerHTML=d.rooms.map(r=>`<tr><td style="font-family:monospace">${r.roomCode}</td><td>${r.leagueName}</td><td>${r.status}</td><td>${r.owners}</td><td>${new Date(r.createdAt).toLocaleDateString()}</td></tr>`).join('');
  document.getElementById('fb-body').innerHTML=d.feedback.map(f=>`<tr><td>${f.page}</td><td>${'★'.repeat(f.rating)}${'☆'.repeat(5-f.rating)}</td><td>${f.message}</td><td>${new Date(f.createdAt).toLocaleDateString()}</td></tr>`).join('');
}
load();
</script></body></html>
