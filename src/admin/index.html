<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"
/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin Login</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0a0e1a;color:#e8eaf0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#131929;border:1px solid #1e2d4a;border-radius:12px;padding:40px;max-width:400px;width:100%;text-align:center}
h1{font-size:1.3rem;font-weight:800;margin-bottom:20px}h1 span{color:#f9a825}
input{width:100%;background:#0a0e1a;border:1px solid #1e2d4a;color:#e8eaf0;padding:10px 14px;border-radius:6px;font-size:0.9rem;margin-bottom:12px}
input:focus{outline:none;border-color:#4fc3f7}
.btn{background:#f9a825;color:#0a0e1a;border:none;padding:10px 24px;border-radius:6px;font-weight:700;cursor:pointer;font-size:0.9rem;width:100%}
.btn:hover{background:#fbc02d}.error{color:#ef9a9a;font-size:0.8rem;margin-top:8px;display:none}
</style></head><body>
<div class="card"><h1>🔒 <span>Admin</span></h1>
<input id="user" placeholder="Username"/><input id="pass" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()"/>
<button class="btn" onclick="doLogin()">Login</button><div class="error" id="err"></div></div>
<script>async function doLogin(){const r=await fetch('/admin/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:document.getElementById('user').value,password:document.getElementById('pass').value})});const d=await r.json();if(d.error){document.getElementById('err').style.display='block';document.getElementById('err').textContent=d.error}else location.reload()}</script>
</body></html>
