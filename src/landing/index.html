<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NCAA Players Club</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&display=swap');
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:#e8eaf0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(0deg,#0b1018 0%,#090c14 50%,#080a11 100%);
}
.container{
  text-align:center;
  padding:40px 24px;
  max-width:600px;
  width:100%;
}
.logo-line{
  display:flex;
  align-items:baseline;
  justify-content:center;
  gap:14px;
  flex-wrap:nowrap;
}
.logo-ncaa{
  font-family:'Inter','SF Pro Display',-apple-system,sans-serif;
  font-weight:800;
  font-size:3.4rem;
  letter-spacing:10px;
  text-transform:uppercase;
  color:#e8eaf0;
  line-height:1;
}
.logo-club{
  font-family:'Playfair Display',Georgia,serif;
  font-style:italic;
  font-weight:700;
  font-size:2.8rem;
  color:#c9a84c;
  letter-spacing:1px;
  line-height:1;
  white-space:nowrap;
}
.divider{
  width:60px;
  height:1px;
  background:linear-gradient(90deg,transparent,#1a2030,transparent);
  margin:36px auto;
}
.gate-box{
  max-width:280px;
  margin:0 auto;
}
.gate-box input{
  width:100%;
  background:#0a0d15;
  border:1px solid #161c2a;
  color:#e8eaf0;
  padding:14px 18px;
  border-radius:8px;
  font-size:0.95rem;
  text-align:center;
  letter-spacing:2px;
  outline:none;
  transition:border-color 0.2s;
}
.gate-box input:focus{border-color:#2a3a5a}
.gate-box input::placeholder{color:#2a3550;letter-spacing:1px;font-size:0.85rem}
.gate-box button{
  width:100%;
  margin-top:14px;
  background:linear-gradient(135deg,#1a2540,#1e3050);
  color:#8a9ab5;
  border:1px solid #1e2d4a;
  padding:13px 24px;
  border-radius:8px;
  font-weight:600;
  font-size:0.85rem;
  cursor:pointer;
  letter-spacing:1.5px;
  text-transform:uppercase;
  transition:all 0.2s;
}
.gate-box button:hover{background:#1e3050;color:#c9d4e8;border-color:#2a3d5a}
.error{color:#ef9a9a;font-size:0.8rem;margin-top:12px;min-height:20px}
</style>
</head>
<body>
<div class="container">
  <div class="logo-line">
    <span class="logo-ncaa">NCAA</span>
    <span class="logo-club">Players Club</span>
  </div>
  <div class="divider"></div>
  <div class="gate-box">
    <input id="pw" type="password" placeholder="Enter access code" autocomplete="off" onkeydown="if(event.key==='Enter')doEnter()"/>
    <button onclick="doEnter()">Enter</button>
    <div class="error" id="err"></div>
  </div>
</div>
<script>
if(localStorage.getItem('npc-access')==='granted'){location.href='/betadraft'}
async function doEnter(){
  const pw=document.getElementById('pw').value.trim();
  if(!pw){document.getElementById('err').textContent='Enter an access code';return}
  const r=await fetch('/gate/verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
  const d=await r.json();
  if(d.ok){localStorage.setItem('npc-access','granted');location.href='/betadraft'}
  else{document.getElementById('err').textContent=d.error||'Invalid code'}
}
</script>
</body>
</html>
