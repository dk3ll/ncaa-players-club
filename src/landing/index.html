<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NCAA Players Club</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
@import url('https://fonts.googleapis.com/css2?family=Pinyon+Script&display=swap');
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#0a0e1a;
  color:#e8eaf0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(0deg,#0f1a2e 0%,#0c1120 30%,#0a0e1a 60%,#0a0e1a 100%);
}
.container{
  text-align:center;
  padding:40px 24px;
  max-width:460px;
  width:100%;
}
.logo-ncaa{
  font-family:"Arial Black",Impact,"Helvetica Neue",sans-serif;
  font-weight:900;
  font-size:4.5rem;
  letter-spacing:8px;
  text-transform:uppercase;
  color:#003DA5;
  text-shadow:0 0 60px rgba(0,61,165,0.25);
  line-height:1;
  margin-bottom:0;
}
.logo-club{
  font-family:'Pinyon Script',cursive;
  font-size:3.2rem;
  color:#c9a84c;
  letter-spacing:2px;
  margin-top:-4px;
  text-shadow:0 0 30px rgba(201,168,76,0.2);
}
.divider{
  width:80px;
  height:1px;
  background:linear-gradient(90deg,transparent,#1e2d4a,transparent);
  margin:32px auto;
}
.gate-box{
  max-width:300px;
  margin:0 auto;
}
.gate-box input{
  width:100%;
  background:#0c1120;
  border:1px solid #1a2540;
  color:#e8eaf0;
  padding:14px 18px;
  border-radius:8px;
  font-size:0.95rem;
  text-align:center;
  letter-spacing:2px;
  outline:none;
  transition:border-color 0.2s;
}
.gate-box input:focus{border-color:#003DA5}
.gate-box input::placeholder{color:#3a4a6a;letter-spacing:1px;font-size:0.85rem}
.gate-box button{
  width:100%;
  margin-top:14px;
  background:linear-gradient(135deg,#003DA5,#0052d4);
  color:#fff;
  border:none;
  padding:13px 24px;
  border-radius:8px;
  font-weight:700;
  font-size:0.9rem;
  cursor:pointer;
  letter-spacing:1px;
  text-transform:uppercase;
  transition:opacity 0.2s;
}
.gate-box button:hover{opacity:0.9}
.error{color:#ef9a9a;font-size:0.8rem;margin-top:12px;min-height:20px}
</style>
</head>
<body>
<div class="container">
  <div class="logo-ncaa">NCAA</div>
  <div class="logo-club">Players Club</div>
  <div class="divider"></div>
  <div class="gate-box">
    <input id="pw" type="password" placeholder="Enter access code" autocomplete="off" onkeydown="if(event.key==='Enter')doEnter()"/>
    <button onclick="doEnter()">Enter</button>
    <div class="error" id="err"></div>
  </div>
</div>
<script>
// Check if already authenticated
if(localStorage.getItem('npc-access')==='granted'){
  location.href='/betadraft';
}
async function doEnter(){
  const pw=document.getElementById('pw').value.trim();
  if(!pw){document.getElementById('err').textContent='Enter an access code';return}
  const r=await fetch('/gate/verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
  const d=await r.json();
  if(d.ok){localStorage.setItem('npc-access','granted');location.href='/betadraft'}
  else{document.getElementById('err').textContent=d.error||'Invalid code'}
}
</script>
</body>
</html>
